openapi: 3.0.2
paths:
  /app/status:
    get:
      tags: &a1
        - app
      parameters: []
      operationId: app.getStatus
      responses:
        "200":
          description: "200"
  /app/version:
    get:
      tags: *a1
      parameters: []
      operationId: app.getVersion
      responses:
        "200":
          description: "200"
  /auth/login-request:
    post:
      tags: &a2
        - auth
      parameters: []
      operationId: auth.loginRequest
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                friendCode:
                  type: string
                  minLength: 1
                skipUpdateScore:
                  default: true
                  type: boolean
                useIdleUpdate:
                  default: false
                  type: boolean
              required:
                - friendCode
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  authUrl:
                    type: string
                  authToken:
                    type: string
                  message:
                    type: string
                  reused:
                    type: boolean
                  idleUpdate:
                    type: boolean
                  job:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                      jobType:
                        type: string
                        enum:
                          - immediate
                          - idle_add_friend
                          - idle_update_score
                          - fetch_friend_list
                      skipUpdateScore:
                        type: boolean
                      botUserFriendCode:
                        type: string
                        nullable: true
                      friendRequestSentAt:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - queued
                          - processing
                          - completed
                          - failed
                          - canceled
                      stage:
                        type: string
                        enum:
                          - send_request
                          - wait_acceptance
                          - update_score
                          - fetch_friend_list
                      profile:
                        nullable: true
                      error:
                        type: string
                        nullable: true
                      executing:
                        type: boolean
                      scoreProgress:
                        type: object
                        properties:
                          completedDiffs:
                            type: array
                            items:
                              type: integer
                              minimum: 0
                              maximum: 14
                          totalDiffs:
                            type: integer
                            minimum: 0
                        required:
                          - completedDiffs
                          - totalDiffs
                        nullable: true
                      updateScoreDuration:
                        type: number
                        nullable: true
                      autoExportResult:
                        type: object
                        properties:
                          divingFish:
                            type: object
                            properties:
                              status:
                                type: string
                              message:
                                type: string
                            required:
                              - status
                            nullable: true
                          lxns:
                            type: object
                            properties:
                              status:
                                type: string
                              message:
                                type: string
                            required:
                              - status
                            nullable: true
                        nullable: true
                      isAuthenticated:
                        type: boolean
                      cabinetScoreMap:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            achievement:
                              type: number
                            dxScore:
                              type: number
                          required:
                            - achievement
                            - dxScore
                        nullable: true
                      diffsToScrape:
                        type: array
                        items:
                          type: integer
                        nullable: true
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                    required:
                      - id
                      - friendCode
                      - jobType
                      - skipUpdateScore
                      - status
                      - stage
                      - createdAt
                      - updatedAt
                required:
                  - jobId
                additionalProperties: true
  /auth/login-status:
    get:
      tags: *a2
      parameters:
        - name: jobId
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      operationId: auth.loginStatus
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  done:
                    type: boolean
                  status:
                    type: string
                  friendCode:
                    type: string
                  message:
                    type: string
                additionalProperties: true
