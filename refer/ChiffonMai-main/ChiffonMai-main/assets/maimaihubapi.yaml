                  type: string
                  nullable: true
                autoExportDivingFish:
                  type: boolean
                autoExportLxns:
                  type: boolean
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  friendCode:
                    type: string
                  hasDivingFishImportToken:
                    type: boolean
                  hasLxnsImportToken:
                    type: boolean
                  profile:
                    nullable: true
                  idleUpdateBotFriendCode:
                    type: string
                    nullable: true
                  autoExportDivingFish:
                    type: boolean
                  autoExportLxns:
                    type: boolean
                  hasCabinetUserId:
                    type: boolean
                  autoUpdate:
                    type: boolean
                  lastScoreHash:
                    type: string
                    nullable: true
                required:
                  - id
                  - friendCode
                additionalProperties: true
