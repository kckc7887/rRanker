                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                    required:
                      - friendCode
                    additionalProperties: true
                required:
                  - token
                  - user
        "400":
          description: "400"
        "404":
          description: "404"
        "409":
          description: "409"
