openapi: 3.0.2
paths:
  /health:
    get:
      tags: &a1
        - app
      parameters: []
      operationId: app.getStatus
      responses:
        "200":
          description: "200"
  /statistics:
    get:
      tags: *a1
      parameters: []
      operationId: app.getStatistics
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  dxnetJobs:
                    type: object
                    properties:
                      totalCount:
                        type: integer
                        minimum: 0
                      completedCount:
                        type: integer
                        minimum: 0
                      failedCount:
                        type: integer
                        minimum: 0
                      successRate:
                        type: number
                      avgDuration:
                        type: number
                        nullable: true
                    required:
                      - totalCount
                      - completedCount
                      - failedCount
                      - successRate
                      - avgDuration
                required:
                  - dxnetJobs
  /auth/login-requests:
    post:
      tags: &a2
        - auth
      parameters: []
      operationId: auth.loginRequest
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                friendCode:
                  type: string
                  minLength: 1
                method:
                  type: string
                  enum:
                    - bot_sends_request
                    - user_sends_request
              required:
                - friendCode
                - method
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  authUrl:
                    type: string
                  authToken:
                    type: string
                  message:
                    type: string
                  reused:
                    type: boolean
                  botFriendCode:
                    type: string
                  createdAt:
                    type: string
                  job:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                      jobType:
                        type: string
                        enum:
                          - send_friend_request
                          - accept_friend_request
                          - update_score
                          - get_user_recent_event
                          - get_full_friend_list
                      priority:
                        type: integer
                      botUserFriendCode:
                        type: string
                        nullable: true
                      friendRequestSentAt:
                        type: string
                        nullable: true
                      friendRequestWaitStartedAt:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - queued
                          - processing
                          - completed
                          - failed
                          - canceled
                      stage:
                        type: string
                        enum:
                          - send_request
                          - wait_acceptance
                          - wait_user_request
                          - accept_request
                          - update_score
                          - get_user_recent_event
                          - get_full_friend_list
                      profile:
                        nullable: true
                      error:
                        type: string
                        nullable: true
                      scoreProgress:
                        type: object
                        properties:
                          completedDiffs:
                            type: array
                            items:
                              type: integer
                              minimum: 0
                              maximum: 14
                          totalDiffs:
                            type: integer
                            minimum: 0
                        required:
                          - completedDiffs
                          - totalDiffs
                        nullable: true
                      updateScoreDuration:
                        type: number
                        nullable: true
                      diffsToScrape:
                        type: array
                        items:
                          type: integer
                        nullable: true
                      context:
                        type: object
                        additionalProperties: {}
                        nullable: true
                      removeFriendAfterComplete:
                        type: boolean
                      runAt:
                        type: string
                        nullable: true
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                    required:
                      - id
                      - friendCode
                      - jobType
                      - status
                      - stage
                      - createdAt
                      - updatedAt
                required:
                  - jobId
                additionalProperties: true
  /auth/login-requests/{jobId}:
    get:
      tags: *a2
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      operationId: auth.loginStatus
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  done:
                    type: boolean
                  status:
                    type: string
                  friendCode:
                    type: string
                  message:
                    type: string
                additionalProperties: true
  /auth/login-requests/{jobId}/verify:
    post:
      tags: *a2
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      operationId: auth.verifyLoginRequest
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                      jobType:
                        type: string
                        enum:
                          - send_friend_request
                          - accept_friend_request
                          - update_score
                          - get_user_recent_event
                          - get_full_friend_list
                      priority:
                        type: integer
                      botUserFriendCode:
                        type: string
                        nullable: true
                      friendRequestSentAt:
                        type: string
                        nullable: true
                      friendRequestWaitStartedAt:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - queued
                          - processing
                          - completed
                          - failed
                          - canceled
                      stage:
                        type: string
                        enum:
                          - send_request
                          - wait_acceptance
                          - wait_user_request
                          - accept_request
                          - update_score
                          - get_user_recent_event
                          - get_full_friend_list
                      profile:
                        nullable: true
                      error:
                        type: string
                        nullable: true
                      scoreProgress:
                        type: object
                        properties:
                          completedDiffs:
                            type: array
                            items:
                              type: integer
                              minimum: 0
                              maximum: 14
                          totalDiffs:
                            type: integer
                            minimum: 0
                        required:
                          - completedDiffs
                          - totalDiffs
                        nullable: true
                      updateScoreDuration:
                        type: number
                        nullable: true
                      diffsToScrape:
                        type: array
                        items:
                          type: integer
                        nullable: true
                      context:
                        type: object
                        additionalProperties: {}
                        nullable: true
                      removeFriendAfterComplete:
                        type: boolean
                      runAt:
                        type: string
                        nullable: true
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                    required:
                      - id
                      - friendCode
                      - jobType
                      - status
                      - stage
                      - createdAt
                      - updatedAt
                required:
                  - job
  /auth/qr-login:
    post:
      tags: *a2
      parameters: []
      operationId: auth.loginByQr
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                qrCode:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                      username:
                        type: string
                        nullable: true
                    required:
                      - friendCode
                    additionalProperties: true
                required:
                  - token
                  - user
        "400":
          description: "400"
        "404":
          description: "404"
        "409":
          description: "409"
  /auth/qr-login/{attemptId}:
    get:
      tags: *a2
      parameters:
        - name: attemptId
          in: path
          required: true
          schema:
            type: string
      operationId: auth.pollLoginByQr
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                nullable: true
        "400":
          description: "400"
  /auth/password-login:
    post:
      tags: *a2
      parameters: []
      operationId: auth.passwordLogin
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                friendCode:
                  type: string
                  pattern: ^\d{15}$
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: ^[A-Za-z0-9_]+$
                password:
                  type: string
                  minLength: 8
                  maxLength: 72
              required:
                - password
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      friendCode:
                        type: string
                      username:
                        type: string
                        nullable: true
                    required:
                      - friendCode
                    additionalProperties: true
                required:
                  - token
                  - user
        "400":
          description: "400"
        "401":
          description: "401"
  /me:
    get:
      tags: &a3
        - users
      parameters: []
      operationId: users.profile
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  friendCode:
                    type: string
                  username:
                    type: string
                    nullable: true
                  hasPassword:
                    type: boolean
                  hasDivingFishImportToken:
                    type: boolean
                  hasLxnsImportToken:
                    type: boolean
                  profile:
                    nullable: true
                  hasCabinetUserId:
                    type: boolean
                  autoUpdate:
                    type: boolean
                required:
                  - id
                  - friendCode
                additionalProperties: true
    patch:
      tags: *a3
      parameters: []
      operationId: users.updateProfile
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                divingFishImportToken:
                  type: string
                  nullable: true
                lxnsImportToken:
                  type: string
                  nullable: true
                autoUpdate:
                  type: boolean
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  friendCode:
                    type: string
                  username:
                    type: string
                    nullable: true
                  hasPassword:
                    type: boolean
                  hasDivingFishImportToken:
                    type: boolean
                  hasLxnsImportToken:
                    type: boolean
                  profile:
                    nullable: true
                  hasCabinetUserId:
                    type: boolean
                  autoUpdate:
                    type: boolean
                required:
                  - id
                  - friendCode
                additionalProperties: true
    delete:
      tags: *a3
      parameters: []
      operationId: users.deleteMe
      responses:
        "200":
          description: "200"
  /me/password:
    put:
      tags: *a3
      parameters: []
      operationId: users.setPassword
      requestBody:
        description: Body
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: ^[A-Za-z0-9_]+$
                currentPassword:
                  type: string
                  minLength: 1
                  maxLength: 72
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 72
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  friendCode:
                    type: string
                  username:
                    type: string
                    nullable: true
