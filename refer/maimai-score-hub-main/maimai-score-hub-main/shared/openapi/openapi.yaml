        content:
          application/json:
            schema:
              type: object
              properties:
                qrCode:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                required:
                  - ok
        "400":
          description: "400"
        "409":
          description: "409"
    delete:
      tags: *a3
      parameters: []
      operationId: users.unbindCabinet
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                required:
                  - ok
        "400":
          description: "400"
  /me/sync/latest:
    get:
