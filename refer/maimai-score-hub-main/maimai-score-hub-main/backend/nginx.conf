server {
    listen 80;
    server_name _;

    # Use docker's embedded DNS so we re-resolve `backend` every 5s.
    # Without this nginx caches DNS at startup and keeps hitting dead
    # container IPs after a deploy. ipv6=off avoids slow AAAA lookups.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    # Increase max body size for large payloads
    client_max_body_size 50M;

    # Compress JSON responses. /api/me/sync/latest is ~500KB and was
    # taking 15s+ over the Server 2 → Server 3 cross-cloud hop;
    # gzip cuts it to ~10% of the original size. proxied=any so
    # responses going through BT panel's nginx in front still get
    # compressed.
    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # Redirect /covers to /covers/
    location = /covers {
        return 301 /covers/;
    }

    # Covers static files
    location /covers/ {
        alias /covers/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Backend proxy (all other paths)
    location / {
        # Use a variable in proxy_pass so nginx OSS goes through the
        # `resolver` block above on every request — picks up new
        # backend container IPs within 5s of a rolling deploy.
        # Without the variable nginx caches the DNS at config load
        # time and never updates it.
        set $upstream_backend "backend:9050";
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Faster failover during deploys: if the upstream we picked
        # is mid-shutdown / dead / 5xx-ing, transparently retry the
        # next address from DNS resolution. non_idempotent allows
        # POST/PATCH retry, which is OK because worker execution is
        # delivered by BullMQ and score sync POSTs are idempotent
        # (writes by jobId).
        proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
