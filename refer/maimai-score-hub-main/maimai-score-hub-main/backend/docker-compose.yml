services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Cap mongo memory. Server 5 has 8GB total; backend×2 + nginx are
    # modest, leaving headroom for mongo+OS+buffer cache.
    # Mongo 7 uses ~cache + ~1-1.5GB for connections/indexes — at our
    # connection volume (backend×2 mongoose pool default 100 each + 3
    # workers' admin RPCs) the non-cache overhead is closer to 2GB,
    # which is why the original 2.5GB cap kept OOM-killing throughout
    # 2026-05-14 evening peak (~1300 fetch failed in worker logs).
    # New plan: cache 1.5GB + 2GB overhead = 3.5GB cap. Combined with
    # capped mongoose pool size on the backend side (see env below)
    # this should keep mongo well under the cap even at peak.
    command:
      - mongod
      - --wiredTigerCacheSizeGB=1.5
    deploy:
      resources:
        limits:
          memory: 3.5G
        reservations:
          memory: 1.5G
    mem_limit: 3.5g
    mem_reservation: 1.5g
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-example}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - noeviction
      - --requirepass
      - '${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production Redis}'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production Redis}
    # Workers run on separate hosts and need this BullMQ Redis endpoint.
    # Keep the published port restricted to worker IPs in the cloud firewall.
    ports:
      - '${REDIS_BIND:-0.0.0.0}:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # Wait up to 60s for in-flight requests to drain on SIGTERM
    # (NestJS enableShutdownHooks closes the http server but lets
    # active connections finish).
    stop_grace_period: 60s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9050/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      PORT: ${PORT:-9050}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-maimai_web}
      MONGO_USER: ${MONGO_USER:-root}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-example}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production Redis}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-maimai:}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-}
      DXNET_DISPATCH_SWEEP_INTERVAL_MS: ${DXNET_DISPATCH_SWEEP_INTERVAL_MS:-30000}
      DXNET_BOT_FRIEND_LIMIT: ${DXNET_BOT_FRIEND_LIMIT:-80}
      PROBER_EXPORT_CONCURRENCY: ${PROBER_EXPORT_CONCURRENCY:-32}
      MUSIC_DATA_URL: ${MUSIC_DATA_URL:-https://www.diving-fish.com/api/maimaidxprober/music_data}
      MUSIC_SYNC_CRON: ${MUSIC_SYNC_CRON:-0 */6 * * *}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      API_SHARED_SECRET: ${API_SHARED_SECRET:-}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OBSERVABILITY_ENV: ${OBSERVABILITY_ENV:-prod}
      OBSERVABILITY_INSTANCE: ${OBSERVABILITY_INSTANCE:-backend-server-5}
      BACKEND_LOG_CLICKHOUSE_ENABLED: ${BACKEND_LOG_CLICKHOUSE_ENABLED:-true}
      BACKEND_LOG_DEBUG_ENABLED: ${BACKEND_LOG_DEBUG_ENABLED:-false}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://host.docker.internal:8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-maimai_observability}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-maimai_dev_writer}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_FLUSH_INTERVAL_MS: ${CLICKHOUSE_FLUSH_INTERVAL_MS:-3000}
      CLICKHOUSE_MAX_BATCH_ROWS: ${CLICKHOUSE_MAX_BATCH_ROWS:-1000}
      CLICKHOUSE_MAX_BUFFERED_ROWS: ${CLICKHOUSE_MAX_BUFFERED_ROWS:-50000}
    volumes:
      - ./covers:/app/backend/covers

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8090:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./covers:/covers:ro

volumes:
  mongo_data:
  redis_data:
