name: deploy worker

on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-worker.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        instance: [1, 2, 3] # 添加更多实例编号
      fail-fast: false # 一个失败不影响其他部署
      max-parallel: 3 # 同时部署的最大数量
    concurrency:
      group: deploy-worker-${{ matrix.instance }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Package source
        run: |
          tar -czf /tmp/maimai-score-hub-worker-${GITHUB_SHA}.tgz \
            worker shared
          ls -lh /tmp/maimai-score-hub-worker-${GITHUB_SHA}.tgz

      - name: Upload source archive to Worker Instance ${{ matrix.instance }}
        timeout-minutes: 3
        env:
          WORKER_HOST: ${{ secrets[format('WORKER_{0}_HOST', matrix.instance)] }}
          WORKER_USER: ${{ secrets[format('WORKER_{0}_USER', matrix.instance)] }}
          WORKER_PORT: ${{ secrets[format('WORKER_{0}_PORT', matrix.instance)] }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          WORKER_PORT="${WORKER_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/worker_deploy_key
          chmod 600 ~/.ssh/worker_deploy_key
          timeout 30s ssh-keyscan -p "$WORKER_PORT" "$WORKER_HOST" >> ~/.ssh/known_hosts
          timeout 180s ssh -C -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            -p "$WORKER_PORT" -i ~/.ssh/worker_deploy_key \
            "$WORKER_USER@$WORKER_HOST" \
            "cat > /tmp/maimai-score-hub-worker-${GITHUB_SHA}.tgz" \
            < /tmp/maimai-score-hub-worker-${GITHUB_SHA}.tgz

      - name: Deploy to Worker Instance ${{ matrix.instance }}
        timeout-minutes: 30
        uses: appleboy/ssh-action@v1.0.3
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          API_SHARED_SECRET: ${{ secrets.API_SHARED_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          WORKER_JOB_SERVICE_BASE_URL: ${{ secrets.WORKER_JOB_SERVICE_BASE_URL }}
        with:
          host: ${{ secrets[format('WORKER_{0}_HOST', matrix.instance)] }}
          username: ${{ secrets[format('WORKER_{0}_USER', matrix.instance)] }}
          # WORKER_N_PORT is optional; appleboy/ssh-action falls back to 22.
          port: ${{ secrets[format('WORKER_{0}_PORT', matrix.instance)] }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          envs: ADMIN_PASSWORD,API_SHARED_SECRET,REDIS_PASSWORD,REDIS_HOST,WORKER_JOB_SERVICE_BASE_URL
          script: |
            DEPLOY_PATH="${{ secrets[format('WORKER_{0}_PATH', matrix.instance)] }}"
            SOURCE_ARCHIVE="/tmp/maimai-score-hub-worker-${{ github.sha }}.tgz"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ WORKER_${{ matrix.instance }}_PATH secret is required"
              exit 1
            fi
            if [ -z "${REDIS_HOST:-}" ]; then
              echo "❌ REDIS_HOST secret is required"
              exit 1
            fi
            if [ -z "${WORKER_JOB_SERVICE_BASE_URL:-}" ]; then
              echo "❌ WORKER_JOB_SERVICE_BASE_URL secret is required"
              exit 1
            fi
            if [ ! -f "$SOURCE_ARCHIVE" ]; then
              echo "❌ Source archive not found: $SOURCE_ARCHIVE"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            sudo chown -R "$USER:$USER" "$(pwd)" || true

            RUNTIME_DIR="$(mktemp -d)"
            if [ -f worker/.env ]; then
              mkdir -p "$RUNTIME_DIR/worker"
              cp -a worker/.env "$RUNTIME_DIR/worker/.env"
            fi
            if [ -d worker/debug-html ]; then
              mkdir -p "$RUNTIME_DIR/worker"
              cp -a worker/debug-html "$RUNTIME_DIR/worker/debug-html"
            fi
            if [ -d worker/data ]; then
              mkdir -p "$RUNTIME_DIR/worker"
              cp -a worker/data "$RUNTIME_DIR/worker/data"
            fi

            rm -rf worker shared
            tar -xzf "$SOURCE_ARCHIVE" -C "$DEPLOY_PATH"
            rm -f "$SOURCE_ARCHIVE"
            if [ -f "$RUNTIME_DIR/worker/.env" ]; then
              cp -a "$RUNTIME_DIR/worker/.env" worker/.env
            fi
            if [ -d "$RUNTIME_DIR/worker/debug-html" ]; then
              rm -rf worker/debug-html
              cp -a "$RUNTIME_DIR/worker/debug-html" worker/debug-html
            fi
            if [ -d "$RUNTIME_DIR/worker/data" ]; then
              rm -rf worker/data
              cp -a "$RUNTIME_DIR/worker/data" worker/data
            fi
            rm -rf "$RUNTIME_DIR"

            upsert_env() {
              local key="$1"
              local value="$2"
              local file="worker/.env"
              if [ -z "$value" ]; then
                return 0
              fi
              touch "$file"
              local tmp
              tmp="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { done = 0 }
                $0 ~ "^" key "=" { print key "=" value; done = 1; next }
                { print }
                END { if (!done) print key "=" value }
              ' "$file" > "$tmp"
              mv "$tmp" "$file"
              chmod 600 "$file"
            }
            upsert_env ADMIN_PASSWORD "${ADMIN_PASSWORD:-}"
            upsert_env API_SHARED_SECRET "${API_SHARED_SECRET:-${ADMIN_PASSWORD:-}}"
            upsert_env REDIS_PASSWORD "${REDIS_PASSWORD:-${ADMIN_PASSWORD:-}}"
            upsert_env REDIS_HOST "${REDIS_HOST:-}"
            upsert_env REDIS_PORT "6379"
            upsert_env REDIS_DB "0"
            upsert_env REDIS_KEY_PREFIX "maimai:"
            upsert_env BULLMQ_PREFIX ""
            upsert_env NODE_ENV "production"
            upsert_env JOB_SERVICE_BASE_URL "${WORKER_JOB_SERVICE_BASE_URL:-}"
            upsert_env DXNET_WORKER_CONCURRENCY "16"
            upsert_env MAX_PROCESS_JOBS "16"
            printf '%s\n' "${{ github.sha }}" > "$DEPLOY_PATH/.deploy-revision"

            # Worker 3 (101) has no public IP and goes through a great-firewall
            # constrained link; route docker pulls through the host's clash proxy.
            # The proxy lives on the host's loopback so daemon already has it
            # via /etc/systemd/system/docker.service.d/*.conf — but build-time
            # network calls (npm install, apt) still need these env vars.
            EXTRA_ENV=""
            if [ "${{ matrix.instance }}" = "3" ]; then
              EXTRA_ENV="HTTP_PROXY=http://127.0.0.1:7890 HTTPS_PROXY=http://127.0.0.1:7890 NO_PROXY=localhost,127.0.0.1"
            fi
            # Cap docker build cache before build to avoid ENOSPC
            sudo docker builder prune --force --keep-storage=2GB || true
            if command -v docker-compose >/dev/null 2>&1; then
              sudo env $EXTRA_ENV \
                ADMIN_PASSWORD="${ADMIN_PASSWORD:-}" \
                API_SHARED_SECRET="${API_SHARED_SECRET:-${ADMIN_PASSWORD:-}}" \
                REDIS_PASSWORD="${REDIS_PASSWORD:-${ADMIN_PASSWORD:-}}" \
                REDIS_HOST="${REDIS_HOST:-}" \
                REDIS_PORT="6379" \
                REDIS_DB="0" \
                REDIS_KEY_PREFIX="maimai:" \
                BULLMQ_PREFIX="" \
                NODE_ENV="production" \
                JOB_SERVICE_BASE_URL="${WORKER_JOB_SERVICE_BASE_URL:-}" \
                DXNET_WORKER_CONCURRENCY="16" \
                MAX_PROCESS_JOBS="16" \
                docker-compose -f worker/docker-compose.yml up -d --build || exit 1
            else
              sudo env $EXTRA_ENV \
                ADMIN_PASSWORD="${ADMIN_PASSWORD:-}" \
                API_SHARED_SECRET="${API_SHARED_SECRET:-${ADMIN_PASSWORD:-}}" \
                REDIS_PASSWORD="${REDIS_PASSWORD:-${ADMIN_PASSWORD:-}}" \
                REDIS_HOST="${REDIS_HOST:-}" \
                REDIS_PORT="6379" \
                REDIS_DB="0" \
                REDIS_KEY_PREFIX="maimai:" \
                BULLMQ_PREFIX="" \
                NODE_ENV="production" \
                JOB_SERVICE_BASE_URL="${WORKER_JOB_SERVICE_BASE_URL:-}" \
                DXNET_WORKER_CONCURRENCY="16" \
                MAX_PROCESS_JOBS="16" \
                docker compose -f worker/docker-compose.yml up -d --build || exit 1
            fi
            sudo docker image prune -f
            # Cap docker build cache so disks don't fill up
            sudo docker builder prune --force --keep-storage=2GB || true
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:3999/api/health; then
                echo "Health check passed on instance ${{ matrix.instance }}"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            done
            echo "Health check failed after 5 attempts on instance ${{ matrix.instance }}"
            exit 1
