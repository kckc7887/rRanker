name: deploy frontend

on:
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build-frontend.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package source
        run: |
          tar -czf /tmp/maimai-score-hub-frontend-${GITHUB_SHA}.tgz \
            frontend shared
          ls -lh /tmp/maimai-score-hub-frontend-${GITHUB_SHA}.tgz

      - name: Upload source archive
        timeout-minutes: 3
        env:
          FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
          FRONTEND_USER: ${{ secrets.FRONTEND_USER }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          FRONTEND_PORT="${FRONTEND_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/frontend_deploy_key
          chmod 600 ~/.ssh/frontend_deploy_key
          timeout 30s ssh-keyscan -p "$FRONTEND_PORT" "$FRONTEND_HOST" >> ~/.ssh/known_hosts
          timeout 180s ssh -C -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            -p "$FRONTEND_PORT" -i ~/.ssh/frontend_deploy_key \
            "$FRONTEND_USER@$FRONTEND_HOST" \
            "cat > /tmp/maimai-score-hub-frontend-${GITHUB_SHA}.tgz" \
            < /tmp/maimai-score-hub-frontend-${GITHUB_SHA}.tgz

      - name: Deploy via SSH
        timeout-minutes: 30
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ${{ secrets.FRONTEND_USER }}
          port: ${{ secrets.FRONTEND_PORT }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            DEPLOY_PATH="${{ secrets.FRONTEND_PATH }}"
            SOURCE_ARCHIVE="/tmp/maimai-score-hub-frontend-${{ github.sha }}.tgz"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ FRONTEND_PATH secret is required"
              exit 1
            fi
            if [ ! -f "$SOURCE_ARCHIVE" ]; then
              echo "❌ Source archive not found: $SOURCE_ARCHIVE"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            sudo chown -R "$USER:$USER" "$(pwd)" || true
            rm -rf frontend shared
            tar -xzf "$SOURCE_ARCHIVE" -C "$DEPLOY_PATH"
            rm -f "$SOURCE_ARCHIVE"
            printf '%s\n' "${{ github.sha }}" > "$DEPLOY_PATH/.deploy-revision"

            # Cap docker build cache before build to avoid ENOSPC
            # mid-build silently falling back to stale layers.
            sudo docker builder prune --force --keep-storage=2GB || true

            PROBE_LOG="/tmp/maimai-score-hub-frontend-probe-${{ github.sha }}.csv"
            PROBE_STOP="/tmp/maimai-score-hub-frontend-probe-${{ github.sha }}.stop"
            rm -f "$PROBE_STOP"
            PROBE_PID=""
            if curl -fsS http://127.0.0.1:8848/ >/dev/null; then
              echo "Starting side probe during frontend deploy"
              bash frontend/scripts/probe-frontend-availability.sh \
                --url http://127.0.0.1:8848/ \
                --duration 900 \
                --interval-ms 100 \
                --timeout 2 \
                --log-file "$PROBE_LOG" \
                --stop-file "$PROBE_STOP" &
              PROBE_PID="$!"
              # Give the probe time to capture pre-deploy availability.
              sleep 2
            else
              echo "Frontend is not currently reachable on localhost:8848; skipping zero-downtime side probe for bootstrap."
            fi

            DEPLOY_STATUS=0
            sudo COMPOSE_FILE="$DEPLOY_PATH/frontend/docker-compose.yml" \
              FRONTEND_HEALTH_URL="http://127.0.0.1:8848/" \
              bash frontend/scripts/deploy-zero-downtime.sh --bootstrap || DEPLOY_STATUS=$?

            PROBE_STATUS=0
            if [ -n "$PROBE_PID" ]; then
              touch "$PROBE_STOP"
              wait "$PROBE_PID" || PROBE_STATUS=$?
              echo "Side probe log: $PROBE_LOG"
              tail -n 20 "$PROBE_LOG" || true
            fi

            sudo docker image prune -f
            # Cap docker build cache so the disk doesn't fill up.
            # The frontend host has limited disk, and BuildKit cache can
            # grow enough to break later deployments.
            sudo docker builder prune --force --keep-storage=2GB || true

            if [ "$DEPLOY_STATUS" -ne 0 ]; then
              echo "Frontend deploy failed with status $DEPLOY_STATUS"
              exit "$DEPLOY_STATUS"
            fi
            if [ "$PROBE_STATUS" -ne 0 ]; then
              echo "Frontend side probe detected downtime"
              exit "$PROBE_STATUS"
            fi

            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8848 >/dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            exit 1
