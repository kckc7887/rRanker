name: deploy backend

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build-backend.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package source
        run: |
          STAGING_DIR="$(mktemp -d)"
          tar -cf - \
            --exclude='backend/.env' \
            --exclude='backend/covers' \
            --exclude='backend/assets' \
            --exclude='backend/dist' \
            --exclude='backend/node_modules' \
            --exclude='shared/dist' \
            --exclude='shared/node_modules' \
            backend shared package.json package-lock.json \
            | tar -xf - -C "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/backend/assets/mai/pic"
          cp backend/assets/mai/pic/UI_GAM_Gauge_DXScoreIcon_*.png \
            "$STAGING_DIR/backend/assets/mai/pic/"
          tar -czf /tmp/maimai-score-hub-backend-${GITHUB_SHA}.tgz -C "$STAGING_DIR" .
          rm -rf "$STAGING_DIR"
          ls -lh /tmp/maimai-score-hub-backend-${GITHUB_SHA}.tgz

      - name: Upload source archive
        timeout-minutes: 3
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          BACKEND_USER: ${{ secrets.BACKEND_USER }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -euo pipefail
          BACKEND_PORT="${BACKEND_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/backend_deploy_key
          chmod 600 ~/.ssh/backend_deploy_key
          timeout 30s ssh-keyscan -p "$BACKEND_PORT" "$BACKEND_HOST" >> ~/.ssh/known_hosts
          timeout 180s ssh -C -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            -p "$BACKEND_PORT" -i ~/.ssh/backend_deploy_key \
            "$BACKEND_USER@$BACKEND_HOST" \
            "cat > /tmp/maimai-score-hub-backend-${GITHUB_SHA}.tgz" \
            < /tmp/maimai-score-hub-backend-${GITHUB_SHA}.tgz

      - name: Deploy via SSH
        timeout-minutes: 30
        uses: appleboy/ssh-action@v1.0.3
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          API_SHARED_SECRET: ${{ secrets.API_SHARED_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          ARTIFACT_SHARED_SECRET: ${{ secrets.ARTIFACT_SHARED_SECRET }}
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.BACKEND_USER }}
          port: ${{ secrets.BACKEND_PORT }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          envs: ADMIN_PASSWORD,API_SHARED_SECRET,REDIS_PASSWORD,CLICKHOUSE_PASSWORD,ARTIFACT_SHARED_SECRET
          script: |
            DEPLOY_PATH="${{ secrets.BACKEND_PATH }}"
            SOURCE_ARCHIVE="/tmp/maimai-score-hub-backend-${{ github.sha }}.tgz"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ BACKEND_PATH secret is required"
              exit 1
            fi
            if [ ! -f "$SOURCE_ARCHIVE" ]; then
              echo "❌ Source archive not found: $SOURCE_ARCHIVE"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            sudo chown -R "$USER:$USER" "$(pwd)" || true

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            RUNTIME_DIR="$(mktemp -d)"
            if [ -f backend/.env ]; then
              mkdir -p "$RUNTIME_DIR/backend"
              cp -a backend/.env "$RUNTIME_DIR/backend/.env"
            fi
            if [ -d backend/covers ]; then
              mkdir -p "$RUNTIME_DIR/backend"
              cp -a backend/covers "$RUNTIME_DIR/backend/covers"
            fi
            if [ -d backend/assets ]; then
              mkdir -p "$RUNTIME_DIR/backend"
              cp -a backend/assets "$RUNTIME_DIR/backend/assets"
            fi

            rm -rf backend shared package.json package-lock.json
            tar -xzf "$SOURCE_ARCHIVE" -C "$DEPLOY_PATH"
            rm -f "$SOURCE_ARCHIVE"
            if [ -f "$RUNTIME_DIR/backend/.env" ]; then
              cp -a "$RUNTIME_DIR/backend/.env" backend/.env
            fi
            if [ -d "$RUNTIME_DIR/backend/covers" ]; then
              rm -rf backend/covers
              cp -a "$RUNTIME_DIR/backend/covers" backend/covers
            fi
            if [ -d "$RUNTIME_DIR/backend/assets" ]; then
              mkdir -p backend/assets
              cp -a "$RUNTIME_DIR/backend/assets/." backend/assets/
            fi
            if [ ! -f backend/assets/fonts/ResourceHanRoundedCN-Bold.ttf ]; then
              echo "❌ backend/assets/fonts/ResourceHanRoundedCN-Bold.ttf is missing; refusing to build incomplete backend image"
              exit 1
            fi
            rm -rf "$RUNTIME_DIR"

            upsert_env() {
              local key="$1"
              local value="$2"
              local file="backend/.env"
              if [ -z "$value" ]; then
                return 0
              fi
              touch "$file"
              local tmp
              tmp="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { done = 0 }
                $0 ~ "^" key "=" { print key "=" value; done = 1; next }
                { print }
                END { if (!done) print key "=" value }
              ' "$file" > "$tmp"
              mv "$tmp" "$file"
              chmod 600 "$file"
            }
            upsert_env OBSERVABILITY_ENABLED "true"
            upsert_env OBSERVABILITY_ENV "prod"
            upsert_env OBSERVABILITY_INSTANCE "backend-server-5"
            upsert_env ADMIN_PASSWORD "${ADMIN_PASSWORD:-}"
            upsert_env API_SHARED_SECRET "${API_SHARED_SECRET:-${ADMIN_PASSWORD:-}}"
            upsert_env REDIS_PASSWORD "${REDIS_PASSWORD:-${ADMIN_PASSWORD:-}}"
            upsert_env DXNET_BOT_FRIEND_LIMIT "80"
            upsert_env PROBER_EXPORT_CONCURRENCY "32"
            upsert_env CLICKHOUSE_URL "http://host.docker.internal:8123"
            upsert_env CLICKHOUSE_DATABASE "maimai_observability"
            upsert_env CLICKHOUSE_USER "maimai_dev_writer"
            upsert_env CLICKHOUSE_PASSWORD "${CLICKHOUSE_PASSWORD:-${ADMIN_PASSWORD:-}}"
            upsert_env ARTIFACT_SERVICE_URL "http://host.docker.internal:3901"
            upsert_env ARTIFACT_SHARED_SECRET "${ARTIFACT_SHARED_SECRET:-${ADMIN_PASSWORD:-}}"
            printf '%s\n' "${{ github.sha }}" > "$DEPLOY_PATH/.deploy-revision"

            cd backend
            # Cap docker build cache BEFORE build (backend host has a
            # limited disk; without this we can hit ENOSPC mid-build, which then
            # silently rebuilds from a stale layer or restarts the old
            # image — masking failures as "success").
            sudo docker builder prune --force --keep-storage=2GB || true
            sudo $COMPOSE_CMD build backend || { echo "❌ Build failed"; exit 1; }

            # Bring stateful dependencies up before the rolling backend update.
            # The backend rollout uses --no-deps to avoid touching healthy
            # replicas, so newly added dependencies like Redis must be started
            # explicitly here.
            sudo $COMPOSE_CMD up -d mongo redis

            wait_service_healthy() {
              local service="$1"
              for i in $(seq 1 30); do
                local healthy
                healthy=$(sudo $COMPOSE_CMD ps "$service" --format json 2>/dev/null \
                  | grep -c '"Health":"healthy"' || true)
                # Fallback for older compose versions whose --format json
                # doesn't include Health: count via classic ps.
                if [ "$healthy" -eq 0 ]; then
                  healthy=$(sudo $COMPOSE_CMD ps "$service" 2>/dev/null \
                    | grep -c "(healthy)" || true)
                fi
                echo "[wait] $service healthy=$healthy (attempt $i/30)"
                if [ "$healthy" -ge 1 ]; then
                  return 0
                fi
                sleep 5
              done
              return 1
            }

            if ! wait_service_healthy mongo; then
              echo "❌ MongoDB did not become healthy within 150s"
              sudo $COMPOSE_CMD logs --tail=100 mongo
              exit 1
            fi

            if ! wait_service_healthy redis; then
              echo "❌ Redis did not become healthy within 150s"
              sudo $COMPOSE_CMD logs --tail=100 redis
              exit 1
            fi

            wait_until_all_healthy() {
              local target_n="$1"
              for i in $(seq 1 30); do
                local healthy
                healthy=$(sudo $COMPOSE_CMD ps backend --format json 2>/dev/null \
                  | grep -c '"Health":"healthy"' || true)
                # Fallback for older compose versions whose --format json
                # doesn't include Health: count via classic ps.
                if [ "$healthy" -eq 0 ]; then
                  healthy=$(sudo $COMPOSE_CMD ps backend 2>/dev/null \
                    | grep -c "(healthy)" || true)
                fi
                echo "[wait] healthy=$healthy / target=$target_n (attempt $i/30)"
                if [ "$healthy" -ge "$target_n" ]; then
                  return 0
                fi
                sleep 5
              done
              return 1
            }

            # Clean up any unhealthy containers from previous failed deployments
            UNHEALTHY_IDS=$(sudo $COMPOSE_CMD ps -q backend | xargs -r sudo docker inspect --format '{{if eq .State.Health.Status "unhealthy"}}{{.Id}}{{end}}' | grep -v '^$' || true)
            if [ -n "$UNHEALTHY_IDS" ]; then
              echo "Removing leftover unhealthy containers: $UNHEALTHY_IDS"
              echo "$UNHEALTHY_IDS" | xargs -r sudo docker rm -f
            fi

            roll_one_replica() {
              echo "── rolling one replica ──"
              sudo $COMPOSE_CMD up -d --no-deps --no-recreate --scale backend=3 backend
              echo "Waiting for 3 healthy backend containers..."
              if ! wait_until_all_healthy 3; then
                echo "❌ New replica did not become healthy within 150s"
                sudo $COMPOSE_CMD logs --tail=100 backend
                exit 1
              fi

              local oldest_id
              oldest_id=$(sudo $COMPOSE_CMD ps -q backend \
                | xargs -r sudo docker inspect \
                    --format '{{.Created}} {{.Id}}' \
                | sort \
                | head -1 \
                | awk '{print $2}')
              if [ -z "$oldest_id" ]; then
                echo "❌ Could not identify oldest backend container"
                exit 1
              fi
              echo "Stopping oldest backend container $oldest_id..."
              sudo docker stop --time=60 "$oldest_id"
              sudo docker rm "$oldest_id"

              sudo $COMPOSE_CMD up -d --no-deps --no-recreate --scale backend=2 backend
              sleep 5
              if ! wait_until_all_healthy 2; then
                echo "❌ After scale-down, fewer than 2 healthy backend containers"
                sudo $COMPOSE_CMD logs --tail=100 backend
                exit 1
              fi
            }

            roll_one_replica
            roll_one_replica
            sudo $COMPOSE_CMD up -d nginx

            # Final state check via nginx (the public path users hit)
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8090/api/v1/health; then
                echo "✅ Deployment successful"
                sudo $COMPOSE_CMD ps backend
                # Clean up dangling images
                sudo docker image prune -f
                # Cap docker build cache so the disk doesn't fill up.
                # The backend host has a limited disk, and BuildKit cache
                # can grow enough to break later deployments.
                sudo docker builder prune --force --keep-storage=2GB || true
                exit 0
              fi
              echo "Final health check attempt $i failed, retrying..."
              sleep 5
            done
            echo "❌ Final nginx health check failed"
            sudo $COMPOSE_CMD logs --tail=100 backend
            exit 1
