services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3999}:3999"
      - "${HTTP_PROXY_PORT:-2222}:2222"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - API_PORT=3999
      - HTTP_PROXY_PORT=2222
      - FETCH_TIMEOUT=${FETCH_TIMEOUT:-300000}
      - FETCH_RETRY_COUNT=${FETCH_RETRY_COUNT:-3}
      - JOB_SERVICE_BASE_URL=${JOB_SERVICE_BASE_URL:?JOB_SERVICE_BASE_URL must be set}
      - API_SHARED_SECRET=${API_SHARED_SECRET:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - REDIS_URL=${REDIS_URL:-}
      - REDIS_HOST=${REDIS_HOST:-127.0.0.1}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-maimai:}
      - BULLMQ_PREFIX=${BULLMQ_PREFIX:-}
      - BULLMQ_JOB_RETRY_DELAY_MS=${BULLMQ_JOB_RETRY_DELAY_MS:-5000}
      - DXNET_WORKER_CONCURRENCY=${DXNET_WORKER_CONCURRENCY:-16}
      - MAX_PROCESS_JOBS=${MAX_PROCESS_JOBS:-16}
      - HTTP_PROXY_PASSWORD=${HTTP_PROXY_PASSWORD:-}
      - WORKER_ID=${WORKER_ID:-}
    volumes:
      - ./debug-html:/app/worker/debug-html
      - worker-data:/app/worker/data

volumes:
  worker-data:
