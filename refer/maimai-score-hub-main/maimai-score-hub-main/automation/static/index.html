<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADB Worker</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #e2e8f0;
        --text-dim: #94a3b8;
        --accent: #3b82f6;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #eab308;
        --orange: #f97316;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 1.5rem;
      }
      .status-bar {
        display: flex;
        gap: 16px;
        font-size: 0.85rem;
        color: var(--text-dim);
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .dot-green {
        background: var(--green);
      }
      .dot-red {
        background: var(--red);
      }
      .dot-yellow {
        background: var(--yellow);
      }

      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
      }
      .tab {
        padding: 8px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px 6px 0 0;
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text-dim);
        border-bottom: none;
      }
      .tab.active {
        background: var(--bg);
        color: var(--accent);
        border-color: var(--accent);
        border-bottom: 2px solid var(--bg);
      }

      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .card-header h3 {
        font-size: 1rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th,
      td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      th {
        color: var(--text-dim);
        font-weight: 500;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-green {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .badge-yellow {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
      }

      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
      }
      .btn-danger {
        background: var(--red);
        color: white;
      }
      .btn-small {
        padding: 4px 8px;
        font-size: 0.75rem;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
      }

      .form-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .form-row label {
        font-size: 0.8rem;
        color: var(--text-dim);
        min-width: 60px;
      }
      input,
      select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 0.85rem;
        z-index: 100;
        transition: opacity 0.3s;
      }
      .toast-success {
        background: var(--green);
        color: white;
      }
      .toast-error {
        background: var(--red);
        color: white;
      }

      .empty {
        text-align: center;
        color: var(--text-dim);
        padding: 32px;
        font-size: 0.9rem;
      }
      .log-msg {
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .time-ago {
        color: var(--text-dim);
        font-size: 0.8rem;
      }

      @media (max-width: 768px) {
        .form-row {
          flex-direction: column;
          align-items: stretch;
        }
        .form-row label {
          min-width: unset;
        }
        table {
          font-size: 0.75rem;
        }
        th,
        td {
          padding: 6px 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📱 ADB Worker</h1>
        <div class="status-bar" id="statusBar">Loading...</div>
      </header>

      <div class="tabs">
        <div class="tab active" data-panel="devices">设备管理</div>
        <div class="tab" data-panel="bots">Bot 状态</div>
        <div class="tab" data-panel="logs">日志</div>
        <div class="tab" data-panel="settings">设置</div>
      </div>

      <!-- Devices Panel (merged with bindings) -->
      <div class="panel active" id="panel-devices">
        <div class="card">
          <div class="card-header">
            <h3>配对 / 连接设备</h3>
          </div>
          <div class="form-row">
            <label>IP</label
            ><input
              id="pairIp"
              placeholder="192.168.1.x"
              style="width: 140px"
            />
            <label>端口</label
            ><input
              id="pairPort"
              type="number"
              placeholder="37xxx"
              style="width: 90px"
            />
            <label>配对码</label
            ><input id="pairCode" placeholder="123456" style="width: 90px" />
            <button class="btn btn-primary" onclick="pairDevice()">配对</button>
          </div>
          <div class="form-row" style="margin-top: 4px">
            <label>连接</label
            ><input
              id="connectIp"
              placeholder="192.168.1.x"
              style="width: 140px"
            />
            <label>端口</label
            ><input
              id="connectPort"
              type="number"
              placeholder="5555"
              style="width: 90px"
            />
            <button class="btn btn-outline" onclick="connectDevice()">
              连接
            </button>
            <button class="btn btn-outline" onclick="scanDevices()">
              扫描
            </button>
          </div>
        </div>

        <div id="deviceCards">
          <div class="empty">加载中...</div>
        </div>
      </div>

      <!-- Bots Panel -->
      <div class="panel" id="panel-bots">
        <div class="card">
          <div class="card-header">
            <h3>Bot 状态</h3>
            <button class="btn btn-outline btn-small" onclick="refreshBots()">
              刷新
            </button>
          </div>
          <table>
            <thead>
              <tr>
                <th>好友码</th>
                <th>状态</th>
                <th>好友数</th>
                <th>最后上报</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="botTable">
              <tr>
                <td colspan="6" class="empty">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Logs Panel -->
      <div class="panel" id="panel-logs">
        <div class="card">
          <div class="card-header">
            <h3>恢复日志</h3>
            <button class="btn btn-outline btn-small" onclick="loadLogs()">
              刷新
            </button>
          </div>
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>好友码</th>
                <th>设备</th>
                <th>状态</th>
                <th>消息</th>
              </tr>
            </thead>
            <tbody id="logTable">
              <tr>
                <td colspan="5" class="empty">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="panel" id="panel-settings">
        <div class="card">
          <div class="card-header">
            <h3>运行时配置</h3>
          </div>
          <div class="form-row">
            <label style="min-width: 120px">Backend URL</label>
            <input
              id="setBackendUrl"
              placeholder="https://..."
              style="flex: 1; min-width: 250px"
            />
          </div>
          <div class="form-row">
            <label style="min-width: 120px">API 共享密钥</label>
            <input
              id="setApiSharedSecret"
              type="password"
              placeholder="用于获取 Bot 状态"
              style="flex: 1; min-width: 250px"
            />
          </div>
          <div class="form-row">
            <label style="min-width: 120px">轮询间隔(s)</label>
            <input id="setPollInterval" type="number" style="width: 100px" />
            <label style="min-width: 120px; margin-left: 16px"
              >设备扫描间隔(s)</label
            >
            <input
              id="setDeviceScanInterval"
              type="number"
              style="width: 100px"
            />
          </div>
          <div class="form-row">
            <label style="min-width: 120px">日志保留条数</label>
            <input
              id="setLogRetention"
              type="number"
              style="width: 100px"
              placeholder="500"
            />
          </div>
          <div class="form-row" style="margin-top: 12px">
            <button class="btn btn-primary" onclick="saveSettings()">
              保存
            </button>
            <button
              class="btn btn-outline"
              onclick="loadSettings()"
              style="margin-left: 8px"
            >
              重置
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "";

      // ====== Tab switching ======
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".panel")
            .forEach((p) => p.classList.remove("active"));
          tab.classList.add("active");
          document
            .getElementById("panel-" + tab.dataset.panel)
            .classList.add("active");
        });
      });

      // ====== Toast ======
      function toast(msg, type = "success") {
        const el = document.createElement("div");
        el.className = "toast toast-" + type;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 300);
        }, 3000);
      }

      // ====== API helpers ======
      async function api(path, opts = {}) {
        try {
          const resp = await fetch(API + path, {
            headers: { "Content-Type": "application/json" },
            ...opts,
            body: opts.body ? JSON.stringify(opts.body) : undefined,
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || JSON.stringify(data));
          return data;
        } catch (e) {
          toast(e.message, "error");
          throw e;
        }
      }

      function timeAgo(iso) {
        if (!iso) return "-";
        const diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return Math.floor(diff) + "秒前";
        if (diff < 3600) return Math.floor(diff / 60) + "分钟前";
        if (diff < 86400) return Math.floor(diff / 3600) + "小时前";
        return Math.floor(diff / 86400) + "天前";
      }

      function truncate(s, len = 50) {
        if (!s) return "-";
        return s.length > len ? s.substring(0, len) + "..." : s;
      }

      // ====== Devices (merged with bindings + proxy) ======
      let _allBindings = [];
      let _allDevices = [];

      async function loadDevices() {
        const [devices, bindings, bots] = await Promise.all([
          api("/api/devices"),
          api("/api/bindings"),
          api("/api/bots").catch(() => []),
        ]);
        _allDevices = devices;
        _allBindings = bindings;
        _cachedBots = bots;

        const container = document.getElementById("deviceCards");
        if (!devices.length) {
          container.innerHTML =
            '<div class="empty">没有设备，请先配对或连接</div>';
          return;
        }

        // Map binding by device_id
        const bindingByDevice = {};
        bindings.forEach((b) => (bindingByDevice[b.device_id] = b));

        container.innerHTML = devices
          .map((d) => {
            const b = bindingByDevice[d.id];
            const isOnline = d.status === "online";
            const statusBadge = `<span class="badge ${isOnline ? "badge-green" : "badge-red"}">${d.status}</span>`;

            let bindingHtml;
            if (b) {
              const bot = bots.find((bot) => bot.friend_code === b.friend_code);
              const botStatus = bot ? (bot.available ? "🟢" : "🔴") : "❓";
              bindingHtml = `
        <div class="form-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <span style="font-size:0.8rem;color:var(--text-dim)">绑定 Bot:</span>
          <span style="font-size:0.85rem">${botStatus} ${b.friend_code}${bot?.remark ? " (" + bot.remark + ")" : ""}</span>
          <span style="font-size:0.75rem;color:var(--text-dim)">恢复 ${b.recovery_count} 次</span>
          <button class="btn btn-primary btn-small" onclick="triggerRecovery('${b.friend_code}')" ${!isOnline ? "disabled" : ""}>恢复</button>
          <button class="btn btn-danger btn-small" onclick="unbindDevice(${b.id})">解绑</button>
        </div>
        <div class="form-row">
          <span style="font-size:0.8rem;color:var(--text-dim)">恢复 URL:</span>
          <input id="bind-url-edit-${b.id}" value="${b.recovery_url || ""}" style="flex:1;min-width:200px;font-size:0.8rem" placeholder="http://...">
          <button class="btn btn-outline btn-small" onclick="updateBindingUrl(${b.id})">保存</button>
        </div>
      `;
            } else {
              const botOpts = bots
                .map(
                  (bot) =>
                    `<option value="${bot.friend_code}">${bot.friend_code}${bot.remark ? " (" + bot.remark + ")" : ""}</option>`,
                )
                .join("");
              bindingHtml = `
        <div class="form-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <span style="font-size:0.8rem;color:var(--text-dim)">绑定 Bot:</span>
          <select id="bind-fc-${CSS.escape(d.id)}" style="width:180px;font-size:0.8rem">${botOpts || "<option>无可用 Bot</option>"}</select>
          <input id="bind-url-${CSS.escape(d.id)}" placeholder="恢复URL" style="flex:1;min-width:150px;font-size:0.8rem">
          <button class="btn btn-primary btn-small" onclick="bindDevice('${d.id}')" ${!isOnline ? "disabled" : ""}>绑定</button>
        </div>
      `;
            }

            return `<div class="card" id="device-card-${CSS.escape(d.id)}">
      <div class="card-header">
        <div>
          <strong>${d.remark || d.model || d.id}</strong>
          <span style="font-size:0.8rem;color:var(--text-dim);margin-left:8px">${d.id}</span>
          ${statusBadge}
          <span class="time-ago" style="margin-left:8px">${timeAgo(d.last_seen)}</span>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-outline btn-small" onclick="editDeviceRemark('${d.id}')">备注</button>
          <button class="btn btn-outline btn-small" onclick="notifyDevice('${d.id}')" ${!isOnline ? "disabled" : ""}>🔔</button>
          <button class="btn btn-danger btn-small" onclick="deleteDevice('${d.id}')">删除</button>
        </div>
      </div>

      <!-- Tools -->
      <div class="form-row">
        <button class="btn btn-outline btn-small" onclick="pushApk('${d.id}')" ${!isOnline ? "disabled" : ""}>📦 推送 Drony APK</button>
        <button class="btn btn-outline btn-small" onclick="setWhitelist('${d.id}')" ${!isOnline ? "disabled" : ""}>🔋 设置保活白名单</button>
      </div>

      ${bindingHtml}
    </div>`;
          })
          .join("");
      }

      async function pushApk(deviceId) {
        try {
          const res = await api(
            "/api/devices/" + encodeURIComponent(deviceId) + "/push-apk",
            { method: "POST" },
          );
          toast("APK 已推送: " + (res.message || "OK"));
        } catch (e) {
          /* toast already shown */
        }
      }

      async function setWhitelist(deviceId) {
        try {
          const res = await api(
            "/api/devices/" + encodeURIComponent(deviceId) + "/whitelist",
            { method: "POST" },
          );
          toast("保活设置完成: " + (res.results || []).join(", "));
        } catch (e) {
          /* toast already shown */
        }
      }

      async function bindDevice(deviceId) {
        const fcSel = document.getElementById(
          "bind-fc-" + CSS.escape(deviceId),
        );
        const urlInput = document.getElementById(
          "bind-url-" + CSS.escape(deviceId),
        );
        const friend_code = fcSel?.value;
        const recovery_url = urlInput?.value;
        if (!friend_code || !recovery_url) {
          toast("请选择 Bot 并填写恢复 URL", "error");
          return;
        }
        await api("/api/bindings", {
          method: "POST",
          body: {
            device_id: deviceId,
            friend_code,
            recovery_url,
            retry_interval: 30,
          },
        });
        toast("绑定成功");
        loadDevices();
      }

      async function unbindDevice(bindingId) {
        if (!confirm("确定解绑？")) return;
        await api("/api/bindings/" + bindingId, { method: "DELETE" });
        toast("已解绑");
        loadDevices();
      }

      async function updateBindingUrl(bindingId) {
        const url = document
          .getElementById("bind-url-edit-" + bindingId)
          ?.value?.trim();
        if (!url) {
          toast("请填写恢复 URL", "error");
          return;
        }
        await api("/api/bindings/" + bindingId, {
          method: "PUT",
          body: { recovery_url: url },
        });
        toast("恢复 URL 已更新");
      }

      function editDeviceRemark(deviceId) {
        const current =
          _allDevices.find((d) => d.id === deviceId)?.remark || "";
        const remark = prompt("输入备注:", current);
        if (remark === null) return;
        api("/api/devices/" + encodeURIComponent(deviceId) + "/remark", {
          method: "PUT",
          body: { remark },
        }).then(() => {
          toast("备注已更新");
          loadDevices();
        });
      }

      async function scanDevices() {
        await api("/api/devices/scan", { method: "POST" });
        toast("扫描完成");
        loadDevices();
      }

      async function pairDevice() {
        const ip = document.getElementById("pairIp").value;
        const port = parseInt(document.getElementById("pairPort").value);
        const code = document.getElementById("pairCode").value;
        if (!ip || !port || !code) {
          toast("请填写完整", "error");
          return;
        }
        await api("/api/devices/pair", {
          method: "POST",
          body: { ip, port, pairing_code: code },
        });
        toast("配对成功");
        loadDevices();
      }

      async function connectDevice() {
        const ip = document.getElementById("connectIp").value;
        const port =
          parseInt(document.getElementById("connectPort").value) || 5555;
        if (!ip) {
          toast("请填写 IP", "error");
          return;
        }
        await api("/api/devices/connect", {
          method: "POST",
          body: { ip, port },
        });
        toast("连接成功");
        loadDevices();
      }

      async function deleteDevice(id) {
        if (!confirm("确定删除设备 " + id + "？")) return;
        await api("/api/devices/" + encodeURIComponent(id), {
          method: "DELETE",
        });
        toast("已删除");
        loadDevices();
      }

      async function notifyDevice(id) {
        try {
          await api("/api/devices/" + encodeURIComponent(id) + "/notify", {
            method: "POST",
            body: { title: "ADB Worker", message: "这是设备: " + id },
          });
          toast("通知已发送到 " + id);
        } catch (e) {
          /* toast already shown */
        }
      }

      // ====== Bots ======
      let _cachedBots = [];

      async function triggerRecovery(fc) {
        try {
          const res = await api("/api/recovery/" + fc, { method: "POST" });
          toast("恢复触发: " + (res.message || "OK"));
          loadDevices();
          loadLogs();
        } catch (e) {
          /* toast already shown */
        }
      }

      async function loadBots() {
        const bots = await api("/api/bots");
        _cachedBots = bots;
        const tbody = document.getElementById("botTable");
        if (!bots.length) {
          tbody.innerHTML =
            '<tr><td colspan="6" class="empty">没有 Bot 数据（请在设置中配置 API 共享密钥）</td></tr>';
          return;
        }
        tbody.innerHTML = bots
          .map(
            (b) => `<tr>
    <td>${b.friend_code}</td>
    <td><span class="badge ${b.available ? "badge-green" : "badge-red"}">${b.available ? "在线" : "离线"}</span></td>
    <td>${b.friend_count ?? "-"}</td>
    <td class="time-ago">${timeAgo(b.last_reported_at)}</td>
    <td>${b.remark || "-"}</td>
    <td>${!b.available ? '<button class="btn btn-primary btn-small" onclick="triggerRecovery(\'' + b.friend_code + "')\">恢复</button>" : ""}</td>
  </tr>`,
          )
          .join("");
      }

      async function refreshBots() {
        await api("/api/bots/refresh", { method: "POST" });
        toast("已刷新");
        loadBots();
      }

      // ====== Logs ======
      async function loadLogs() {
        const logs = await api("/api/logs");
        const tbody = document.getElementById("logTable");
        if (!logs.length) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="empty">暂无日志</td></tr>';
          return;
        }
        tbody.innerHTML = logs
          .map(
            (l) => `<tr>
    <td class="time-ago">${timeAgo(l.created_at)}</td>
    <td>${l.friend_code}</td>
    <td>${l.device_id}</td>
    <td><span class="badge ${l.status === "success" ? "badge-green" : "badge-red"}">${l.status}</span></td>
    <td class="log-msg" title="${l.message}">${truncate(l.message, 60)}</td>
  </tr>`,
          )
          .join("");
      }

      // ====== Status bar ======
      async function loadStatus() {
        try {
          const s = await api("/api/status");
          const bar = document.getElementById("statusBar");
          bar.innerHTML = `
      <span><span class="status-dot ${s.devices.online > 0 ? "dot-green" : "dot-red"}"></span>设备 ${s.devices.online}/${s.devices.total}</span>
      <span><span class="status-dot ${s.bots.unavailable === 0 ? "dot-green" : s.bots.unavailable > 0 ? "dot-red" : "dot-yellow"}"></span>Bot ${s.bots.available}/${s.bots.total}</span>
      ${s.running_recovery ? '<span><span class="status-dot dot-yellow"></span>恢复中: ' + s.running_recovery + "</span>" : ""}
      ${s.monitor_error ? '<span style="color:var(--red)">⚠ ' + truncate(s.monitor_error, 30) + "</span>" : ""}
    `;
        } catch (e) {
          /* ignore */
        }
      }

      // ====== Settings ======
      async function loadSettings() {
        const s = await api("/api/settings");
        document.getElementById("setBackendUrl").value = s.backend_url || "";
        document.getElementById("setApiSharedSecret").value =
          s.api_shared_secret || "";
        document.getElementById("setPollInterval").value =
          s.poll_interval || "30";
        document.getElementById("setDeviceScanInterval").value =
          s.device_scan_interval || "10";
        document.getElementById("setLogRetention").value =
          s.log_retention_count || "500";
      }

      async function saveSettings() {
        const body = {
          backend_url: document.getElementById("setBackendUrl").value,
          api_shared_secret:
            document.getElementById("setApiSharedSecret").value,
          poll_interval:
            parseInt(document.getElementById("setPollInterval").value) || 30,
          device_scan_interval:
            parseInt(document.getElementById("setDeviceScanInterval").value) ||
            10,
          log_retention_count:
            parseInt(document.getElementById("setLogRetention").value) || 500,
        };
        await api("/api/settings", { method: "PUT", body });
        toast("设置已保存");
        loadStatus();
      }

      // ====== Init ======
      async function init() {
        await Promise.all([
          loadDevices(),
          loadBots(),
          loadLogs(),
          loadStatus(),
          loadSettings(),
        ]);
        // Auto-refresh
        setInterval(loadStatus, 10000);
        setInterval(loadDevices, 15000);
        setInterval(loadBots, 30000);
      }

      init();
    </script>
  </body>
</html>
