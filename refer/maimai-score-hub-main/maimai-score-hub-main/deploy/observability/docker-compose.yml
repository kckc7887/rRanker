services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: maimai-observability-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: maimai_observability
      CLICKHOUSE_USER: maimai_dev_writer
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  artifact-service:
    build: ./artifact-service
    container_name: maimai-observability-artifact
    restart: unless-stopped
    environment:
      ARTIFACT_ROOT: /data/artifacts
      ARTIFACT_SHARED_SECRET: ${ARTIFACT_SHARED_SECRET:?required}
      RAW_RESPONSE_MAX_BODY_BYTES: ${RAW_RESPONSE_MAX_BODY_BYTES:-2097152}
      RAW_RESPONSE_MAX_TOTAL_BYTES: ${RAW_RESPONSE_MAX_TOTAL_BYTES:-21474836480}
      RAW_RESPONSE_DEFAULT_TTL_HOURS: ${RAW_RESPONSE_DEFAULT_TTL_HOURS:-24}
      RAW_RESPONSE_ERROR_TTL_DAYS: ${RAW_RESPONSE_ERROR_TTL_DAYS:-7}
      ARTIFACT_CLEANUP_INTERVAL_MS: ${ARTIFACT_CLEANUP_INTERVAL_MS:-600000}
    ports:
      - "3901:3901"
    volumes:
      - ./artifacts:/data/artifacts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3901/health"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  clickhouse_data:
